<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FD Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        
        <h4 class="text-center mb-4">Fixed Deposit Calculator</h4>

        <input type="text" id="name" class="form-control mb-3" placeholder="Name">

        <input type="number" id="amount" class="form-control mb-3" placeholder="Amount">

        <input type="number" id="tenure" class="form-control mb-3" placeholder="Tenure (years)">

        <input type="number" id="age" class="form-control mb-3" placeholder="Age">

        <div id="result" class="alert alert-secondary text-center">
            Status: Hey Name total maturity value is :
        </div>

        <div class="d-flex justify-content-between">
            <button class="btn btn-primary w-50 me-2" onclick="calculate()">Check</button>
            <button class="btn btn-danger w-50" onclick="resetForm()">Cancel</button>
        </div>

    </div>
</div>

<script>
function calculate() {
    let name = document.getElementById("name").value;
    let amount = parseFloat(document.getElementById("amount").value);
    let tenure = parseFloat(document.getElementById("tenure").value);
    let age = parseInt(document.getElementById("age").value);

    let roi;

    if (age > 60) {
        roi = 8;
    } else if (age > 25 && age <= 60) {
        roi = 7;
    } else {
        roi = 6;
    }

    let maturity = amount + (amount * roi * tenure / 100);

    document.getElementById("result").innerHTML =
        `<strong>Status:</strong> Hey ${name}, total maturity value is: ₹${maturity.toFixed(2)}`;
}

function resetForm() {
    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("tenure").value = "";
    document.getElementById("age").value = "";

    document.getElementById("result").innerHTML =
        "Status: Hey Name total maturity value is :";
}
</script>

</body>
</html>
